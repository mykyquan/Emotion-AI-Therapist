services:
  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./Backend
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      PORT: 3000
      REDIS_URL: redis://redis:6379
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CORS_ORIGINS: http://localhost:${FRONTEND_PORT:-5173},http://127.0.0.1:${FRONTEND_PORT:-5173}
      DEBUG_AI: "false"

  frontend:
    build:
      context: ./Frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:3000

volumes:
  redis_data:
